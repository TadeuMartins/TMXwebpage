  "trajetoria": {
    "pt": "Sou Tadeu Rosa Martins, engenheiro eletricista com mais de 12 anos de experiência na indústria, unindo conhecimento técnico, visão de negócios e paixão por tecnologia. Minha carreira começou cedo, ainda na área de manutenção industrial, e evoluiu até a liderança de projetos complexos de digitalização e inteligência artificial em grandes empresas.\n\nAtuei em organizações como Votorantim Cimentos e InterCement e atualmente faço parte da Siemens, atuando como gerente de projetos, em todas minhas experiências tive a oportunidade de vivenciar de perto os desafios e as transformações do setor industrial. Essa trajetória me ensinou que a verdadeira inovação nasce quando unimos experiência prática, gestão eficiente e tecnologia inteligente.\n\nSou formado em Engenharia Elétrica, com MBA em Gestão Empresarial pela FGV, além das certificações PMP (PMI) e AI Engineer (Microsoft). Acredito no aprendizado contínuo e no uso da inteligência artificial como aliada da produtividade e da tomada de decisão.\n\nMeu propósito é claro: conectar o mundo físico da indústria ao universo digital, ajudando empresas e profissionais a trabalharem de forma mais ágil, inteligente e estratégica.\n\nEm meu tempo livre, busco desenvolver técnicas e ferramentas voltadas para uma gestão de projetos mais eficiente. Foi assim que nasceu a TAUON, e com ela a primeira ferramenta: Pi - TAUON Project Intelligence, criada para eliminar uma das principais dores de gerentes de projeto e manutenção em todo o mundo.\nAbaixo, você poderá conhecer essa solução em mais detalhes.",
    "en": "I am Tadeu Rosa Martins, an electrical engineer with over 12 years of experience in industry, combining technical knowledge, business vision, and passion for technology. My career started early, in the industrial maintenance field, and evolved to leading complex digitalization and artificial intelligence projects in large companies.\n\nI worked at organizations such as Votorantim Cimentos and InterCement, and I am currently part of Siemens, working as a project manager. In all my experiences, I had the opportunity to closely experience the challenges and transformations of the industrial sector. This journey taught me that true innovation is born when we unite practical experience, efficient management, and intelligent technology.\n\nI hold a degree in Electrical Engineering, with an MBA in Business Management from FGV, in addition to PMP (PMI) and AI Engineer (Microsoft) certifications. I believe in continuous learning and in using artificial intelligence as an ally for productivity and decision-making.\n\nMy purpose is clear: to connect the physical world of industry to the digital universe, helping companies and professionals work in a more agile, intelligent, and strategic way.\n\nIn my free time, I seek to develop techniques and tools focused on more efficient project management. That's how TAUON was born, and with it the first tool: Pi - TAUON Project Intelligence, created to eliminate one of the main pain points of project and maintenance managers worldwide.\nBelow, you can learn more about this solution.",
    "es": "Soy Tadeu Rosa Martins, ingeniero electricista con más de 12 años de experiencia en la industria, uniendo conocimiento técnico, visión de negocios y pasión por la tecnología. Mi carrera comenzó temprano, en el área de mantenimiento industrial, y evolucionó hasta el liderazgo de proyectos complejos de digitalización e inteligencia artificial en grandes empresas.\n\nActué en organizaciones como Votorantim Cimentos e InterCement, y actualmente formo parte de Siemens, trabajando como gerente de proyectos. En todas mis experiencias tuve la oportunidad de vivenciar de cerca los desafíos y transformaciones del sector industrial. Esta trayectoria me enseñó que la verdadera innovación nace cuando unimos experiencia práctica, gestión eficiente y tecnología inteligente.\n\nSoy graduado en Ingeniería Eléctrica, con MBA en Gestión Empresarial por la FGV, además de las certificaciones PMP (PMI) y AI Engineer (Microsoft). Creo en el aprendizaje continuo y en el uso de la inteligencia artificial como aliada de la productividad y la toma de decisiones.\n\nMi propósito es claro: conectar el mundo físico de la industria con el universo digital, ayudando a empresas y profesionales a trabajar de forma más ágil, inteligente y estratégica.\n\nEn mi tiempo libre, busco desarrollar técnicas y herramientas enfocadas en una gestión de proyectos más eficiente. Así nació TAUON, y con ella la primera herramienta: Pi - TAUON Project Intelligence, creada para eliminar uno de los principales puntos de dolor de los gerentes de proyecto y mantenimiento en todo el mundo.\nA continuación, podrá conocer esta solución con más detalle."
  },
  "historia": {
    "pt": {
      "titulo": "Nossa História",
      "subtitulo": "A origem da TAUON",
      "texto": "A TAUON nasceu da convicção de que a gestão de projetos industriais precisa ser radicalmente transformada. A constatação que motivou a empresa é alarmante: mais de 70% dos projetos industriais não atingem seus objetivos de prazo, custo ou escopo.\n\nFundada por especialistas com décadas de atuação combinadas em gestão de projetos de capital, manutenção industrial, tecnologia e inteligência artificial, a TAUON foi criada com o propósito de redefinir os padrões do setor por meio de tecnologia avançada e metodologias colaborativas comprovadas — eliminando as barreiras que historicamente impedem o sucesso na execução de projetos industriais.\n\nO Pi (Project Intelligence) é nossa primeira solução e materializa esse compromisso: entregar ferramentas que geram impacto real no dia a dia de gerentes de projetos e equipes de manutenção.",
      "missao_titulo": "Nossa Missão",
      "missao": "Transformar a gestão de projetos industriais por meio de tecnologia inteligente e metodologias colaborativas, tornando o sucesso a regra, não a exceção.",
      "porque_titulo": "Por que TAUON?",
      "porque": "O nome vem do tauon (lépton tau) — uma partícula elementar de massa muito superior à do elétron, capaz de gerar reações de altíssima energia e impacto. Essa é a essência que carregamos: pequenas decisões com efeito desproporcional. Como o tauon, queremos ser o componente discreto que libera energia transformadora na gestão de projetos industriais."
    },
    "en": {
      "titulo": "Our History",
      "subtitulo": "The origin of TAUON",
      "texto": "TAUON was born from the conviction that industrial project management needs to be radically transformed. The finding that motivated the company is alarming: more than 70% of industrial projects fail to meet their schedule, cost, or scope objectives.\n\nFounded by specialists with combined decades of experience in capital project management, industrial maintenance, technology, and artificial intelligence, TAUON was created with the purpose of redefining sector standards through advanced technology and proven collaborative methodologies — eliminating the barriers that have historically prevented success in industrial project execution.\n\nPi (Project Intelligence) is our first solution and embodies this commitment: delivering tools that generate real impact in the daily lives of project managers and maintenance teams.",
      "missao_titulo": "Our Mission",

                preload: 'auto',
                playsinline: 'true',
                onloadedmetadata: function(){ try { if (this.currentTime < 2 && this.duration > 2) { this.currentTime = 2; } } catch (e) { console.warn('Video seek to 2s failed:', e); } }
              })
            ])
          ])
        ]) : null,

        // Título principal
        el('div', {class:'mx-auto max-w-4xl mb-12'}, [
          el('div', {class:'text-center'}, [
            el('p', {class:'mb-3 text-sm font-semibold uppercase tracking-widest text-blue-700'}, [txt(t(C.tmxsmartpm).prelaunch)]),
            el('h2', {class:'text-3xl font-extrabold tracking-tight sm:text-5xl mb-3 text-gray-900'}, [txt(t(C.tmxsmartpm).titulo || 'Pi - TAUON Project Intelligence')]),
            t(C.tmxsmartpm).subtitulo ? el('p', {class:'text-xl text-blue-600 font-medium mb-8'}, [txt(t(C.tmxsmartpm).subtitulo)]) : null
          ]),
          el('div', {class:'space-y-4 text-lg text-gray-600 leading-relaxed text-left'}, (t(C.tmxsmartpm).introducao||'').split('\n\n').map(p => el('p', {}, [txt(p)])))
        ]),
        // Compact CTA Banner — darker blue, less vertical space
        el('div', {class:'mx-auto max-w-3xl mb-16'}, [
          extA({
            href: (C.tmxsmartpm.url || '#contato'),
            target: '_blank',
            class: 'group flex flex-col sm:flex-row items-center justify-between gap-4 rounded-xl bg-gradient-to-r from-blue-800 via-blue-900 to-blue-950 px-5 py-4 sm:px-6 sm:py-4 shadow-lg hover:shadow-xl hover:shadow-blue-900/30 transition-all duration-300'
          }, [
            el('p', {class:'text-base sm:text-lg font-semibold text-white text-center sm:text-left'}, [txt(t(C.tmxsmartpm).cta)]),
            el('span', {class:'inline-flex items-center gap-2 rounded-lg bg-white/10 hover:bg-white/20 ring-1 ring-white/30 px-4 py-2 text-white font-semibold text-sm transition-colors whitespace-nowrap'}, [
              txt(currentLang === 'pt' ? 'Acessar agora' : currentLang === 'en' ? 'Access now' : 'Acceder ahora'),
              el('i', {'data-lucide':'arrow-right', class:'h-4 w-4 group-hover:translate-x-1 transition-transform', 'aria-hidden':'true'})
            ])
          ])
        ]),

        // Destaque
        el('div', {class:'mx-auto max-w-4xl text-center mb-10'}, [
          el('h3', {class:'text-2xl font-bold tracking-tight sm:text-3xl text-gray-900'}, [txt(t(C.tmxsmartpm).destaque || '')])
        ]),
        // Features grid (now with icons)
        el('div', {class:'grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3 mb-20'}, (t(C.tmxsmartpm.features)||[]).map(feature =>
          el('div', {class:'rounded-2xl border border-gray-200/80 bg-white p-7 shadow-card hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300'}, [
            feature.icon ? el('div', {class:'flex h-11 w-11 items-center justify-center rounded-xl bg-gradient-to-br from-blue-600 to-blue-700 text-white mb-4 shadow-md shadow-blue-600/20'}, [el('i', {'data-lucide':feature.icon, class:'h-5 w-5', 'aria-hidden':'true'})]) : null,
            el('h4', {class:'text-lg font-bold mb-3 text-gray-900'}, [txt(feature.titulo)]),
            el('p', {class:'text-sm text-gray-600 leading-relaxed'}, [txt(feature.descricao)])
          ])
        )),

        // === INTEGRATIONS callout — bidirectional only, no implementation details ===
        el('div', {class:'mx-auto max-w-5xl mb-20'}, [
          el('div', {class:'text-center mb-10'}, [
            el('h3', {class:'text-2xl font-bold tracking-tight sm:text-3xl text-gray-900'}, [txt(t(C.ui).integrationsTitle)]),
            el('p', {class:'mt-3 text-gray-500'}, [txt(t(C.ui).integrationsSubtitle)])
          ]),
          el('div', {class:'grid grid-cols-1 md:grid-cols-2 gap-6'}, [
            el('div', {class:'flex flex-col items-center text-center rounded-2xl border border-gray-200/80 bg-white p-8 shadow-card hover:shadow-lg transition-all'}, [
              el('div', {class:'flex h-20 items-center justify-center mb-5'}, [
                el('img', {src:'assets/ms-project-logo.jpeg', alt:'Microsoft Project', class:'max-h-20 w-auto object-contain', loading:'lazy'})
              ]),
              el('h4', {class:'text-lg font-bold text-gray-900 mb-2'}, [txt('Microsoft Project')]),
              el('p', {class:'text-sm text-gray-600 leading-relaxed'}, [txt(t(C.ui).integration_msproject_desc)])
            ]),
            el('div', {class:'flex flex-col items-center text-center rounded-2xl border border-gray-200/80 bg-white p-8 shadow-card hover:shadow-lg transition-all'}, [
              el('div', {class:'flex h-20 items-center justify-center mb-5'}, [
                el('img', {src:'assets/primavera-p6-logo.jpeg', alt:'Oracle Primavera P6', class:'max-h-20 w-auto object-contain', loading:'lazy'})
              ]),
              el('h4', {class:'text-lg font-bold text-gray-900 mb-2'}, [txt('Oracle Primavera P6')]),
              el('p', {class:'text-sm text-gray-600 leading-relaxed'}, [txt(t(C.ui).integration_p6_desc)])
            ])
          ])
        ]),

        // CTAs (blue primary)
        el('div', {class:'mx-auto max-w-md flex flex-col gap-5'}, [
          extA({href:(C.tmxsmartpm.url||'#contato'), target:'_blank', class:'inline-flex items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-blue-700 to-blue-800 hover:from-blue-800 hover:to-blue-900 px-6 py-4 text-base font-semibold text-white shadow-md shadow-blue-700/20 hover:shadow-lg transition-all'}, [
            txt(t(C.ui).accessSmartPM),
            el('i', {'data-lucide':'external-link', class:'h-4 w-4', 'aria-hidden':'true'})
          ]),
          extA({href:'#contato', class:'inline-flex items-center justify-center rounded-xl border border-gray-300 px-6 py-4 text-base font-semibold text-gray-700 hover:bg-gray-50 transition-all'}, [txt(t(C.tmxsmartpm).cta_contact)])
        ])
      ]);
      root.appendChild(pm);
    }

    // HISTÓRIA DA TAUON (TAUON History Section)
    if (C.historia) {
      const historiaContent = t(C.historia);
      // Section divider
      root.appendChild(el('div', {class:'section-divider mx-auto max-w-5xl my-4'}));
      const historia = el('section', {id:'historia', class:'mx-auto max-w-7xl px-6 py-20'}, [
        el('div', {class:'mx-auto max-w-4xl text-center mb-14'}, [
          el('p', {class:'mb-3 text-sm font-semibold uppercase tracking-widest text-blue-600'}, [txt(historiaContent.subtitulo || '')]),
          el('h2', {class:'text-3xl font-extrabold tracking-tight sm:text-5xl text-gray-900'}, [txt(historiaContent.titulo || '')])
        ]),
        el('div', {class:'mx-auto max-w-6xl grid grid-cols-1 gap-6 md:gap-8 md:grid-cols-3 items-stretch'}, [
          // Story card
          el('article', {class:'rounded-2xl border border-gray-200/80 bg-white p-7 shadow-card hover:shadow-lg transition-all duration-300 flex flex-col'}, [
            el('div', {class:'flex items-center gap-3 mb-5'}, [
              el('div', {class:'flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-blue-600 to-blue-700 text-white shadow-md shadow-blue-600/20'}, [el('i', {'data-lucide':'book-open', class:'h-5 w-5', 'aria-hidden':'true'})]),
              el('h3', {class:'text-lg font-bold text-gray-900'}, [txt(historiaContent.titulo || '')])
            ]),
            el('div', {class:'space-y-4 text-gray-600 leading-relaxed text-sm'}, (historiaContent.texto||'').split('\n\n').map(p => el('p', {}, [txt(p)])))
          ]),
          // Mission card
          el('article', {class:'rounded-2xl border border-gray-200/80 bg-gradient-to-br from-blue-50 to-white p-7 shadow-card hover:shadow-lg transition-all duration-300 flex flex-col'}, [
            el('div', {class:'flex items-center gap-3 mb-5'}, [
              el('div', {class:'flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-blue-600 to-blue-700 text-white shadow-md shadow-blue-600/20'}, [el('i', {'data-lucide':'target', class:'h-5 w-5', 'aria-hidden':'true'})]),
              el('h3', {class:'text-lg font-bold text-gray-900'}, [txt(historiaContent.missao_titulo || '')])
            ]),
            el('p', {class:'text-gray-600 leading-relaxed text-sm'}, [txt(historiaContent.missao || '')])
          ]),
          // Why TAUON? card
          historiaContent.porque ? el('article', {class:'rounded-2xl border border-gray-200/80 bg-white p-7 shadow-card hover:shadow-lg transition-all duration-300 flex flex-col'}, [
            el('div', {class:'flex items-center gap-3 mb-5'}, [
              el('div', {class:'flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-blue-700 to-blue-800 text-white shadow-md shadow-blue-700/20'}, [el('i', {'data-lucide':'atom', class:'h-5 w-5', 'aria-hidden':'true'})]),
              el('h3', {class:'text-lg font-bold text-gray-900'}, [txt(historiaContent.porque_titulo || '')])
            ]),
            el('p', {class:'text-gray-600 leading-relaxed text-sm'}, [txt(historiaContent.porque)])
          ]) : null
        ])
      ]);
      root.appendChild(historia);
    }

    // SOBRE (ARTIGOS) - section removed by request

    // LIVRO section hidden

    // CONTATO
    const contato = el('section', {id:'contato', class:'mx-auto max-w-7xl px-6 py-20 bg-gradient-to-br from-blue-800 via-blue-900 to-blue-950 rounded-3xl my-8'}, [
      el('div', {class:'mx-auto max-w-3xl text-center'}, [
        el('p', {class:'mb-3 text-sm font-semibold uppercase tracking-widest text-blue-200/80'}, [txt(t(C.ui).contact)]),
        el('h2', {class:'text-3xl font-extrabold tracking-tight sm:text-4xl text-white'}, [txt(t(C.ui).talkToMe)]),
        el('p', {class:'mt-4 text-lg text-blue-100/90 leading-relaxed'}, [txt(t(C.ui).contactDescription)])
      ]),
      el('div', {class:'mx-auto mt-10 grid max-w-3xl grid-cols-1 gap-6 md:grid-cols-2'}, [
        extA({href:'mailto:'+(C.contato?.email||'#'), class:'rounded-2xl bg-white p-7 shadow-card transition-all duration-300 hover:-translate-y-1 hover:shadow-xl'}, [
          el('div', {class:'flex items-start gap-4'}, [
            el('div', {class:'flex h-12 w-12 items-center justify-center rounded-xl bg-gradient-to-br from-blue-700 to-blue-800 text-white shadow-md shadow-blue-700/20'}, [el('i', {'data-lucide':'mail', class:'h-5 w-5', 'aria-hidden':'true'})]),
            el('div', {}, [ el('h4', {class:'text-lg font-bold text-gray-900'}, [txt(t(C.ui).email)]), el('p', {class:'text-sm text-gray-500 mt-1 break-words'}, [txt(C.contato?.email || '')]) ])
          ])
        ]),
        extA({href:(C.contato?.whatsapp||'#'), target:'_blank', class:'rounded-2xl bg-white p-7 shadow-card transition-all duration-300 hover:-translate-y-1 hover:shadow-xl'}, [
          el('div', {class:'flex items-start gap-4'}, [
            el('div', {class:'flex h-12 w-12 items-center justify-center rounded-xl bg-gradient-to-br from-blue-700 to-blue-800 text-white shadow-md shadow-blue-700/20'}, [el('i', {'data-lucide':'phone', class:'h-5 w-5', 'aria-hidden':'true'})]),
            el('div', {}, [ el('h4', {class:'text-lg font-bold text-gray-900'}, [txt(t(C.ui).whatsapp)]), el('p', {class:'text-sm text-gray-500 mt-1'}, [txt(C.contato?.telefone || '')]) ])
          ])
        ])
      ])
    ]);
    root.appendChild(contato);

    // FOOTER (richer columns)
    const ui = t(C.ui);
    const footer = el('footer', {class:'border-t border-gray-200 bg-gray-50', role:'contentinfo'}, [
      el('div', {class:'mx-auto max-w-7xl px-6 py-12'}, [
        el('div', {class:'grid grid-cols-1 md:grid-cols-4 gap-8 mb-10'}, [
          // Brand col
          el('div', {class:'md:col-span-1'}, [
            el('div', {class:'flex items-center gap-3 mb-4'}, [
              el('div', {class:'flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br from-blue-600 to-blue-700 shadow-md shadow-blue-600/20'}, [el('i', {'data-lucide':'factory', class:'w-4 h-4 text-white', 'aria-hidden':'true'})]),
              el('p', {class:'text-sm font-bold tracking-widest text-gray-900'}, [txt(t(C.header).brand || 'TAUON')])
            ]),
            el('p', {class:'text-sm text-gray-500 leading-relaxed'}, [txt(t(C.header).owner || 'Project Intelligence')])
          ]),
          // Product col
          el('div', {}, [
            el('p', {class:'text-xs font-bold uppercase tracking-widest text-gray-900 mb-3'}, [txt(ui.footer_product)]),
            el('ul', {class:'space-y-2 text-sm text-gray-500'}, [
              el('li', {}, [extA({href:'#tmxsmartpm', class:'hover:text-blue-600'}, [txt('Pi — Project Intelligence')])]),
              el('li', {}, [extA({href:'#tmxsmartpm', class:'hover:text-blue-600'}, [txt(ui.integrationsTitle)])]),
              el('li', {}, [extA({href:'#contato', class:'hover:text-blue-600'}, [txt(ui.requestDemo)])])
            ])
          ]),
          // Company col
          el('div', {}, [
            el('p', {class:'text-xs font-bold uppercase tracking-widest text-gray-900 mb-3'}, [txt(ui.footer_company)]),
            el('ul', {class:'space-y-2 text-sm text-gray-500'}, [
              el('li', {}, [extA({href:'#historia', class:'hover:text-blue-600'}, [txt(t(C.header).navHistory)])]),
              el('li', {}, [extA({href:'#contato', class:'hover:text-blue-600'}, [txt(t(C.header).navContact)])])
            ])
          ]),
          // Contact col
          el('div', {}, [
            el('p', {class:'text-xs font-bold uppercase tracking-widest text-gray-900 mb-3'}, [txt(ui.footer_contact)]),
            el('ul', {class:'space-y-2 text-sm text-gray-500'}, [
              C.contato?.email ? el('li', {}, [extA({href:'mailto:'+C.contato.email, class:'hover:text-blue-600 break-words'}, [txt(C.contato.email)])]) : null,
              C.contato?.whatsapp ? el('li', {}, [extA({href:C.contato.whatsapp, target:'_blank', class:'hover:text-blue-600'}, [txt(C.contato.telefone || 'WhatsApp')])]) : null
            ])
          ])
        ]),
        el('div', {class:'border-t border-gray-200 pt-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between'}, [
          el('p', {class:'text-xs text-gray-500'}, [txt('© '+ new Date().getFullYear() +' '+ (t(C.ui).copyright||'TAUON.') +' '+ ui.footer_rights)]),
          el('p', {class:'text-[11px] text-gray-400 leading-relaxed sm:text-right max-w-md'}, [txt(ui.footer_trademarks)])
        ])
      ])
    ]);
    root.appendChild(footer);

    // Initialize icons if lucide is available
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }

    // Scroll reveal animations
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('section, aside, .tab-content').forEach(section => {
      section.classList.add('reveal');
      revealObserver.observe(section);
    });
    }

    // Initial render
    renderPage();

    // Scroll progress indicator (set up once, not on each re-render)
    const progressBar = document.getElementById('scroll-progress');
    if (progressBar) {
      const updateProgress = () => {
        const h = document.documentElement;
        const scrolled = h.scrollTop;
        const max = h.scrollHeight - h.clientHeight;
        const pct = max > 0 ? (scrolled / max) * 100 : 0;
        progressBar.style.width = pct + '%';
      };
      window.addEventListener('scroll', updateProgress, { passive: true });
      window.addEventListener('resize', updateProgress);
      updateProgress();
    }
  })();
  </script>
</body>
</html>
